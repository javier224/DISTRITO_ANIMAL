<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet"
        href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css">

    <style>
        body {
            position: relative;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow: hidden;
            background-image: url("{{ url_for('static', filename='img/fondo_formulario.jpeg') }}");
        }

        .btn-regresar {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            /* espacio entre ícono y texto */
            background: #d9c7b0;
            /* beige */
            color: #4b2e2e;
            /* café oscuro */
            font-size: 1.1rem;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-regresar:hover {
            background: #b89b7a;
            /* tono más oscuro al pasar el mouse */
            color: #fff;
            transform: scale(1.05);
            /* efecto de escalado */
        }

        .titulo-editar {
            color: white;
            /* café oscuro */
            font-family: 'Segoe UI', sans-serif;
            font-weight: 700;
        }
    </style>

</head>

<body>

    <h1 class="text-center display-4 titulo-editar">
        ✏️ Editar {{info.nombre}}
    </h1>


    <div class="container my-5">
        <a href="{{ url_for('catalogo.home') }}" class="btn-regresar">
            <span class="las la-arrow-left"></span> Regresar
        </a>
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <form action="{{ url_for ('catalogo.editarCatalogo', id=info.id)}}" method="post"
                    class="p-4 rounded shadow bg-light">

                    <h3 class="text-center mb-4 text-success fw-bold">Editar Servicio del Catálogo</h3>

                    <div class="mb-3">
                        <label for="nombre" class="form-label fw-semibold text-dark">Nombre</label>
                        <input type="text" class="form-control border-success shadow-sm" id="nombre" name="nombre"
                            value="{{info.nombre}}" placeholder="Ingrese el nombre del producto o servicio">
                    </div>

                    <div class="mb-3">
                        <label for="precio" class="form-label fw-semibold text-dark">Precio</label>
                        <input type="number" class="form-control border-success shadow-sm" id="precio" name="precio"
                            value="{{info.precio}}" placeholder="Ejemplo: 50000">
                    </div>

                    <div class="mb-3">
                        <label for="stock" class="form-label fw-semibold text-dark">Stock</label>
                        <input type="number" class="form-control border-success shadow-sm" id="stock" name="stock"
                            value="{{info.stock}}" placeholder="Cantidad disponible">
                    </div>

                    <div class="mb-3">
                        <label for="opcionCatalogo" class="form-label fw-semibold text-dark">Item</label>
                        <select class="form-select border-success shadow-sm" id="opcionCatalogo" name="opcionCatalogo">
                            <option value="VACUNA" {% if info.tipo_item=="VACUNA" %}selected{% endif %}>Vacuna</option>
                            <option value="DESPARASITANTE" {% if info.tipo_item=="DESPARASITANTE" %}selected{% endif %}>
                                Desparasitante</option>
                            <option value="ALIMENTO" {% if info.tipo_item=="ALIMENTO" %}selected{% endif %}>Alimento
                            </option>
                            <option value="SERVICIO" {% if info.tipo_item=="SERVICIO" %}selected{% endif %}>Servicio
                            </option>
                        </select>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success fw-bold shadow-sm">Editar Servicio</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>

</html>
