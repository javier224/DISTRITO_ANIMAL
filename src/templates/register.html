<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - Distrito Animal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-lg p-8 space-y-6 bg-white shadow-xl rounded-xl">
        <h1 class="text-3xl font-bold text-center text-gray-800">Registro de Usuario</h1>
        <p class="text-center text-sm text-gray-500">Completa tus datos para crear una cuenta.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="p-4 rounded-lg border {% if category == 'error' %}bg-red-100 border-red-400 text-red-700{% else %}bg-green-100 border-green-400 text-green-700{% endif %}">
                  <p class="font-semibold">{{ message }}</p>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <form action="{{ url_for('register') }}" method="post" class="space-y-4">

            <div>
                <label for="documentoUsuario" class="block mb-1 text-sm font-medium text-gray-700">Documento de Identidad</label>
                <input type="number" id="documentoUsuario" name="documentoUsuario" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="Ej: 1020304050">
            </div>

            <div>
                <label for="emailUsu" class="block mb-1 text-sm font-medium text-gray-700">Correo Electrónico</label>
                <input type="email" id="emailUsu" name="emailUsu" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="tu.nombre@ejemplo.com">
            </div>
            
            <div>
                <label for="telefonoUsu" class="block mb-1 text-sm font-medium text-gray-700">Teléfono</label>
                <input type="number" id="telefonoUsu" name="telefonoUsu" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="Ej: 3001234567">
            </div>

            <div>
                <label for="contrasenaUsu" class="block mb-1 text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="contrasenaUsu" name="contrasenaUsu" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="Mínimo 8 caracteres">
            </div>
            
            <button type="submit" class="w-full py-2 text-white bg-green-600 rounded-lg hover:bg-green-700 transition duration-150 ease-in-out font-semibold shadow-md">
                Registrarme
            </button>
        </form>

        <p class="text-sm text-center text-gray-500">
            ¿Ya tienes una cuenta? 
            <a href="{{ url_for('login') }}" class="text-blue-600 hover:text-blue-700 font-medium">Iniciar Sesión</a>
        </p>
    </div>

</body>
</html>
