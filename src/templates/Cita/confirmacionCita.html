<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cita Confirmada - Distrito Animal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .card-confirm { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .icon-box { color: #28a745; font-size: 80px; margin-bottom: 20px; }
        .btn-home { background-color: #2c3e50; color: white; border-radius: 50px; padding: 10px 30px; }
        .btn-home:hover { color: white; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card card-confirm p-5">
                    <div class="icon-box">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <h1 class="font-weight-bold">¡Cita Confirmada!</h1>
                    <p class="text-muted lead">Hemos recibido tu confirmación. El Dr. {{ veterinario }} espera a <strong>{{ mascota }}</strong> con mucho gusto.</p>
                    <hr>
                    <div class="text-left mb-4">
                        <p><i class="far fa-calendar-alt mr-2"></i> <strong>Fecha:</strong> {{ fecha }}</p>
                        <p><i class="far fa-clock mr-2"></i> <strong>Hora:</strong> {{ hora }}</p>
                    </div>
                    <p class="small text-secondary">¿Necesitas reagendar? Llámanos al (XXX) XXX-XXXX</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
