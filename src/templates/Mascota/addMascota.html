<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>agregar mascota</title>
</head>

<body>
    <main>
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-10">
                    <div class="card shadow border-0">
                        <div class="card-header bg-success text-white py-3">
                            <h4 class="mb-0 fw-bold"><i class="fas fa-plus-circle me-2"></i>Registrar Mascota</h4>
                        </div>
                        <div class="card-body p-4">
                            <form action="{{ url_for('mascota_bp.addMascota') }}" method="POST">
                                <div class="row g-3 mb-4">
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Nombre</label>
                                        <input type="text" class="form-control border-success shadow-sm" name="nombre"
                                            placeholder="Ej: Toby" required>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Especie</label>
                                        <input type="text" class="form-control border-success shadow-sm" name="especie"
                                            placeholder="Ej: Canino">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Raza</label>
                                        <input type="text" class="form-control border-success shadow-sm" name="raza"
                                            placeholder="Ej: Labrador">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Fecha Nacimiento</label>
                                        <input type="date" class="form-control border-success shadow-sm"
                                            name="fecha_nacimiento">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Género</label>
                                        <select class="form-select border-success shadow-sm" name="genero">
                                            <option value="MACHO">Macho</option>
                                            <option value="HEMBRA">Hembra</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Peso (kg)</label>
                                        <input type="number" step="0.1" class="form-control border-success shadow-sm"
                                            name="peso">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Dueño (Responsable)</label>
                                        <select class="form-select border-success shadow-sm" name="id_dueno" required>
                                            <option value="" selected disabled>Seleccione el dueño...</option>
                                            {% for p in perfiles %}
                                            <option value="{{ p.id_perfil }}">{{ p.nombre_completo }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Observaciones</label>
                                        <input type="text" class="form-control border-success shadow-sm"
                                            name="observaciones" placeholder="Alergias, conducta, etc.">
                                    </div>
                                </div>
                                <div class="d-flex justify-content-between border-top pt-3">
                                    <a href="{{ url_for('mascota_bp.mascota') }}" class="btn btn-outline-secondary px-4">
                                        <i class="fas fa-arrow-left"></i> Regresar
                                    </a>
                                    <button class="btn btn-success btn-lg px-5 fw-bold shadow" type="submit">
                                        Guardar Mascota
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
